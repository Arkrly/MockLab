spring.application.name=MockLab API

# ── MySQL Datasource ──────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/mocklab?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=mocklab
spring.datasource.password=mocklabpass
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ──────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ── JWT ───────────────────────────────────────────────────────────
mocklab.jwt.secret=bW9ja2xhYi1zdXBlci1zZWNyZXQta2V5LWZvci1qd3QtdG9rZW4tZ2VuZXJhdGlvbi0yMDI0
mocklab.jwt.expiration-ms=86400000

# ── Scheduling ────────────────────────────────────────────────────
spring.task.scheduling.pool.size=2

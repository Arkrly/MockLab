<div>
  @if (isLoading) {
    <div class="flex items-center justify-center py-12">
      <div class="relative">
        <div class="w-12 h-12 rounded-full border-4 border-gray-200"></div>
        <div class="w-12 h-12 rounded-full border-4 border-indigo-600 border-t-transparent animate-spin absolute top-0 left-0"></div>
      </div>
    </div>
  }

  @if (!isLoading && logs.length === 0) {
    <app-empty-state
      title="No logs yet"
      message="Logs will appear here once you start making requests to your mock endpoints."
      icon="log" />
  }

  @if (!isLoading && logs.length > 0) {
    <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
      <div #logContainer class="max-h-[500px] overflow-y-auto">
        <table class="w-full">
          <thead class="bg-gray-50 border-b border-gray-100 sticky top-0">
            <tr>
              <th class="text-left text-xs font-medium text-gray-500 uppercase tracking-wider px-6 py-3">Time</th>
              <th class="text-left text-xs font-medium text-gray-500 uppercase tracking-wider px-6 py-3">Method</th>
              <th class="text-left text-xs font-medium text-gray-500 uppercase tracking-wider px-6 py-3">Path</th>
              <th class="text-left text-xs font-medium text-gray-500 uppercase tracking-wider px-6 py-3">Status</th>
              <th class="text-center text-xs font-medium text-gray-500 uppercase tracking-wider px-6 py-3">Matched</th>
            </tr>
          </thead>
          <tbody class="divide-y divide-gray-100">
            @for (log of logs; track log.id) {
              <tr class="hover:bg-gray-50 transition-colors">
                <td class="px-6 py-3 text-sm text-gray-500 whitespace-nowrap">
                  {{ log.loggedAt | timeAgo }}
                </td>
                <td class="px-6 py-3">
                  <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-bold" [class]="log.method | methodColor">
                    {{ log.method }}
                  </span>
                </td>
                <td class="px-6 py-3 font-mono text-sm text-gray-700 max-w-xs truncate">
                  {{ log.path }}
                </td>
                <td class="px-6 py-3">
                  <app-status-badge [statusCode]="log.responseStatus" />
                </td>
                <td class="px-6 py-3 text-center">
                  @if (log.matched) {
                    <svg class="w-5 h-5 text-green-500 mx-auto" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
                    </svg>
                  } @else {
                    <svg class="w-5 h-5 text-red-400 mx-auto" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                    </svg>
                  }
                </td>
              </tr>
            }
          </tbody>
        </table>
      </div>
    </div>
    <p class="text-xs text-gray-400 mt-2 text-right">Auto-refreshing every 5 seconds</p>
  }
</div>

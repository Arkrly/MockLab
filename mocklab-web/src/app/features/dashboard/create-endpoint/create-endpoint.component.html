<div class="p-8">
  <!-- Breadcrumb -->
  <nav class="flex items-center gap-2 text-sm text-gray-500 mb-6">
    <a routerLink="/dashboard" class="hover:text-indigo-600 transition-colors">Dashboard</a>
    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
    </svg>
    <a [routerLink]="['/dashboard/workspace', workspaceId]" class="hover:text-indigo-600 transition-colors">Workspace</a>
    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
    </svg>
    <span class="text-gray-900 font-medium">New Endpoint</span>
  </nav>

  <div class="max-w-2xl">
    <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6">
      <h1 class="text-xl font-semibold text-gray-900 mb-6">New Mock Endpoint</h1>

      @if (errorMessage) {
        <div class="mb-4 px-4 py-3 bg-red-50 border border-red-200 text-red-700 rounded-lg text-sm">
          {{ errorMessage }}
        </div>
      }

      <form [formGroup]="endpointForm" (ngSubmit)="onSubmit()" class="space-y-5">
        <!-- Method & Path row -->
        <div class="flex gap-3">
          <div class="w-36">
            <label class="block text-sm font-medium text-gray-700 mb-1">Method</label>
            <select
              formControlName="method"
              class="border border-gray-300 rounded-lg px-3 py-2 w-full focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none transition bg-white">
              @for (m of httpMethods; track m) {
                <option [value]="m">{{ m }}</option>
              }
            </select>
          </div>
          <div class="flex-1">
            <label class="block text-sm font-medium text-gray-700 mb-1">Path</label>
            <input
              type="text"
              formControlName="path"
              class="border border-gray-300 rounded-lg px-3 py-2 w-full focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none transition font-mono"
              placeholder="/api/users">
          </div>
        </div>

        <!-- Response Body -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Response Body</label>
          <textarea
            formControlName="responseBody"
            rows="8"
            class="border border-gray-300 rounded-lg px-3 py-2 w-full focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none transition font-mono text-sm"
            placeholder='{"message": "Hello World"}'></textarea>
        </div>

        <!-- Status Code -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Status Code</label>
          <input
            type="number"
            formControlName="statusCode"
            class="border border-gray-300 rounded-lg px-3 py-2 w-32 focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none transition"
            min="100"
            max="599">
        </div>

        <!-- Latency Slider -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">
            Latency: <span class="text-indigo-600 font-semibold">{{ latencyValue }}ms</span>
          </label>
          <input
            type="range"
            formControlName="latencyMs"
            min="0"
            max="3000"
            step="50"
            class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-indigo-600">
          <div class="flex justify-between text-xs text-gray-400 mt-1">
            <span>0ms</span>
            <span>1500ms</span>
            <span>3000ms</span>
          </div>
        </div>

        <!-- Stateful Toggle -->
        <div class="flex items-center justify-between bg-gray-50 rounded-lg px-4 py-3">
          <div>
            <p class="text-sm font-medium text-gray-700">Enable stateful simulation</p>
            <p class="text-xs text-gray-500 mt-0.5">Store and retrieve data across requests</p>
          </div>
          <button
            type="button"
            (click)="endpointForm.patchValue({ statefulEnabled: !endpointForm.value.statefulEnabled })"
            class="relative inline-flex h-6 w-11 items-center rounded-full transition-colors"
            [class]="endpointForm.value.statefulEnabled ? 'bg-indigo-600' : 'bg-gray-300'">
            <span
              class="inline-block h-4 w-4 transform rounded-full bg-white transition-transform"
              [class]="endpointForm.value.statefulEnabled ? 'translate-x-6' : 'translate-x-1'">
            </span>
          </button>
        </div>

        <!-- Buttons -->
        <div class="flex gap-3 pt-2">
          <button
            type="submit"
            [disabled]="isLoading || endpointForm.invalid"
            class="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-2 rounded-lg font-medium transition-colors disabled:opacity-50">
            @if (isLoading) { Creating... } @else { Create Endpoint }
          </button>
          <a [routerLink]="['/dashboard/workspace', workspaceId]"
             class="px-6 py-2 rounded-lg text-gray-700 hover:bg-gray-100 transition-colors font-medium">
            Cancel
          </a>
        </div>
      </form>
    </div>
  </div>
</div>
